version: '3.8'

services:
  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-5000}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=WorldCup2026;Username=postgres;Password=${DB_PASSWORD:-YourStrong!Passw0rd}
      - Jwt__Secret=${JWT_SECRET:-WorldCup2026SuperSecretKey-ChangeThisInProduction-Min32Chars!}
      - Jwt__Issuer=WorldCup2026API
      - Jwt__Audience=WorldCup2026Web
      - Cors__Origins=${CORS_ORIGINS:-http://localhost:3000}
      - FootballData__ApiKey=${FOOTBALL_DATA_API_KEY:-}
      - Google__ClientId=${GOOGLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./WEB
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=WorldCup2026
      - POSTGRES_PASSWORD=${DB_PASSWORD:-YourStrong!Passw0rd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
